<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITCHEN - Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; font-family: 'Plus Jakarta Sans', sans-serif; }
        .admin-gradient { background: linear-gradient(135deg, #E65100 0%, #FF9800 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <span class="text-3xl font-black text-orange-600 tracking-tighter">KITCHEN <span class="text-gray-400 font-light">ADMIN</span></span>
            <p class="text-gray-500 mt-2 text-sm font-semibold uppercase tracking-widest">Dashboard Access</p>
        </div>

        <form id="admin-login-form" class="space-y-6">
            <div>
                <label class="block text-xs font-black text-gray-400 mb-2 uppercase">Email Administrator</label>
                <input type="email" id="admin-email" required placeholder="admin@kitchen.com" 
                    class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 ring-orange-500 outline-none transition">
            </div>

            <div>
                <label class="block text-xs font-black text-gray-400 mb-2 uppercase">Password</label>
                <input type="password" id="admin-pass" required placeholder="••••••••" 
                    class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 ring-orange-500 outline-none transition">
            </div>

            <button type="button" onclick="handleAdminLogin()" 
                class="w-full admin-gradient text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:opacity-90 transition transform active:scale-95">
                Masuk ke Dashboard
            </button>
        </form>

        <p class="text-center mt-8 text-xs text-gray-400 italic">
            Hanya untuk staf resmi KITCHEN.
        </p>
    </div>

    <script>
        function handleAdminLogin() {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;

            // Kredensial Statis
            const ADMIN_EMAIL = "admin@kitchen.com";
            const ADMIN_PASS = "admin123";

            if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
                // Simpan status login admin di session (biar hilang kalau tab ditutup)
                sessionStorage.setItem('isAdminLoggedIn', 'true');
                alert("Selamat datang, Admin!");
                window.location.href = 'admin-survey.html'; // Pindah ke halaman admin
            } else {
                alert("Email atau Password Admin salah!");
            }
        }
    </script>
</body>
</html>
