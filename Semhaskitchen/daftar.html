<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - KITCHEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FDF8F3; font-family: 'Plus Jakarta Sans', sans-serif; }
        .orange-text { color: #E65100; }
        .scale-in { animation: scaleIn 0.3s ease-out forwards; }
        @keyframes scaleIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center py-12 px-4">
    
    <div class="mb-8 text-center">
        <span class="text-4xl font-black orange-text">KITCHEN</span>
        <p class="text-gray-500 mt-2">Gabung sekarang dan mulai kumpulkan poin lezatmu!</p>
    </div>

    <div class="bg-white p-8 md:p-10 rounded-[2.5rem] shadow-xl w-full max-w-md border border-gray-100">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Buat Akun Baru</h2>
        
        <form id="form-daftar" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold mb-2 text-gray-600">Nama Lengkap</label>
                <div class="relative">
                    <span class="absolute left-4 top-4 text-gray-400">👤</span>
                    <input type="text" id="reg-nama" required placeholder="Nama Lengkap Anda" 
                        class="w-full p-4 pl-12 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 ring-orange-500 outline-none transition">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2 text-gray-600">Alamat Email</label>
                <div class="relative">
                    <span class="absolute left-4 top-4 text-gray-400">✉️</span>
                    <input type="email" id="reg-email" required placeholder="nama@email.com" 
                        class="w-full p-4 pl-12 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 ring-orange-500 outline-none transition">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2 text-gray-600">Password</label>
                <div class="relative">
                    <span class="absolute left-4 top-4 text-gray-400">🔒</span>
                    <input type="password" id="reg-pass" required placeholder="Minimal 8 karakter" 
                        class="w-full p-4 pl-12 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 ring-orange-500 outline-none transition">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2 text-gray-600">Alamat Pengiriman Utama</label>
                <div class="relative">
                    <span class="absolute left-4 top-4 text-gray-400">📍</span>
                    <textarea id="reg-address" required placeholder="Contoh: Jl. Sudirman No. 123, Jakarta" 
                        class="w-full p-4 pl-12 bg-gray-50 border border-gray-200 rounded-2xl h-24 focus:ring-2 ring-orange-500 outline-none transition resize-none"></textarea>
                </div>
            </div>

            <div class="flex items-start gap-3 py-2">
                <input type="checkbox" id="agree-terms" required class="mt-1 w-4 h-4 accent-orange-600 cursor-pointer">
                <label for="agree-terms" class="text-xs text-gray-500 leading-relaxed cursor-pointer">
                    Saya setuju dengan <span class="text-orange-600 font-bold hover:underline">Syarat & Ketentuan</span> KITCHEN.
                </label>
            </div>
            
            <button type="button" onclick="handleDaftar()" id="btn-daftar" 
                class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-orange-700 transition transform active:scale-95">
                Daftar Sekarang
            </button>
        </form>

        <p class="text-center mt-8 text-sm text-gray-600">
            Sudah punya akun? 
            <a href="login.html" class="text-orange-600 font-bold hover:underline">Masuk di sini</a>
        </p>
    </div>

    <div id="modal-daftar-sukses" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center scale-in">
            <div class="w-20 h-20 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-6">🎉</div>
            <h2 class="text-2xl font-black mb-2 text-gray-800">Berhasil!</h2>
            <p class="text-gray-500 mb-8" id="welcome-msg"></p>
            <button onclick="window.location.href='login.html'" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-orange-700 transition">
                Lanjut ke Login
            </button>
        </div>
    </div>

    <script>
        function handleDaftar() {
            const nama = document.getElementById('reg-nama').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const alamat = document.getElementById('reg-address').value; // Ambil alamat
            const agree = document.getElementById('agree-terms').checked;
            const btn = document.getElementById('btn-daftar');

            // Validasi Input
            if(!nama || !email || !pass || !alamat) {
                alert("Mohon isi semua data termasuk alamat!");
                return;
            }
            if(!agree) {
                alert("Anda harus menyetujui Syarat & Ketentuan!");
                return;
            }

            btn.innerHTML = `<span class="inline-block animate-pulse">Memproses...</span>`;
            btn.disabled = true;

            // Simpan ke LocalStorage dengan field alamat
            const user = { 
                nama: nama, 
                email: email, 
                pass: pass, 
                alamat: alamat, // Menyimpan alamat ke profil
                poin: 0 
            };
            
            localStorage.setItem('kitchenUser', JSON.stringify(user));

            setTimeout(() => {
                document.getElementById('welcome-msg').innerText = `Halo ${nama}, akunmu sudah siap! Alamatmu telah tersimpan untuk memudahkan checkout.`;
                const modal = document.getElementById('modal-daftar-sukses');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            }, 1000);
        }
    </script>
</body>
</html>
