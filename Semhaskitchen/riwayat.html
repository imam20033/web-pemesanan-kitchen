<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITCHEN - Riwayat Pesanan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDF8F3; }
        .orange-text { color: #E65100; }
        .orange-bg { background-color: #E65100; }
        .star-active { color: #FFB300; }
        .star-inactive { color: #D1D5DB; }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-card { animation: slideUp 0.4s ease-out forwards; }
        .floating-feedback { position: fixed; bottom: 30px; right: 30px; z-index: 90; }
    </style>
</head>
<body onload="renderHistory()">

    <nav class="bg-white/80 backdrop-blur-md px-12 py-4 flex justify-between items-center border-b sticky top-0 z-50">
        <span class="text-2xl font-black orange-text">KITCHEN</span>
        <div class="flex gap-6">
            <a href="index.html" class="text-sm font-bold text-gray-600 hover:text-orange-600">🏠 Menu Utama</a>
            <a href="profil.html" class="text-sm font-bold text-gray-600 hover:text-orange-600">👤 Profil</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 md:p-12">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-black text-gray-800">Riwayat Pesanan</h1>
                <p class="text-gray-500 font-medium">Beri rating untuk dapatkan poin lebih banyak!</p>
            </div>
        </header>

        <div id="history-container" class="space-y-8 mb-20"></div>
    </main>

    <a href="https://forms.gle/wMy51pbfT9BtLmef8" target="_blank" class="floating-feedback flex items-center gap-3 bg-white border-2 border-orange-500 text-orange-600 px-6 py-3 rounded-full font-bold shadow-xl hover:bg-orange-600 hover:text-white transition-all group">
        <span class="text-xl group-hover:rotate-12 transition-transform">📋</span>
        Isi Survei Kepuasan
    </a>

    <div id="rating-modal" class="fixed inset-0 bg-black/60 hidden z-[100] items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-md w-full shadow-2xl">
            <div class="text-center mb-6">
                <span class="text-4xl mb-4 block">🍳</span>
                <h2 id="rating-food-name" class="text-2xl font-black text-gray-800">Nama Makanan</h2>
                <p class="text-gray-400 text-sm mt-1">Berikan penilaianmu</p>
            </div>
            <div class="flex justify-center gap-2 mb-8 text-4xl">
                <button onclick="setStar(1)" class="star-btn star-inactive transition-transform hover:scale-110" id="star-1">★</button>
                <button onclick="setStar(2)" class="star-btn star-inactive transition-transform hover:scale-110" id="star-2">★</button>
                <button onclick="setStar(3)" class="star-btn star-inactive transition-transform hover:scale-110" id="star-3">★</button>
                <button onclick="setStar(4)" class="star-btn star-inactive transition-transform hover:scale-110" id="star-4">★</button>
                <button onclick="setStar(5)" class="star-btn star-inactive transition-transform hover:scale-110" id="star-5">★</button>
            </div>
            <textarea id="rating-comment" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl h-28 outline-none mb-6" placeholder="Komentar kamu..."></textarea>
            <div class="flex gap-4">
                <button onclick="closeRatingModal()" class="flex-1 py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold">Batal</button>
                <button onclick="saveItemRating()" class="flex-1 py-4 orange-bg text-white rounded-2xl font-bold">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        let currentOrderIdx = null, currentItemIdx = null, selectedStars = 0;

        function renderHistory() {
            const container = document.getElementById('history-container');
            const history = JSON.parse(localStorage.getItem('kitchenHistory')) || [];

            if (history.length === 0) {
                container.innerHTML = `<div class="text-center py-20 bg-white rounded-[3rem] border-2 border-dashed border-gray-200"><p class="text-gray-400 font-bold">Belum ada pesanan.</p></div>`;
                return;
            }

            container.innerHTML = '';
            history.forEach((order, oIdx) => {
                let itemsHtml = '';
                if (order.items_detail) {
                    order.items_detail.forEach((item, iIdx) => {
                        const hasRated = item.rating > 0;
                        itemsHtml += `
                            <div class="flex justify-between items-center py-4 border-b border-gray-50 last:border-0">
                                <div class="flex-1">
                                    <p class="font-bold text-gray-800">${item.name} <span class="orange-text">x${item.qty}</span></p>
                                    ${hasRated ? `<div class="flex gap-0.5 text-yellow-500 text-xs mt-1">${'★'.repeat(item.rating)}${'☆'.repeat(5-item.rating)}</div>` : ''}
                                </div>
                                ${!hasRated ? 
                                    `<button onclick="openRatingModal(${oIdx}, ${iIdx}, '${item.name}')" class="text-[10px] bg-orange-600 text-white px-3 py-1.5 rounded-lg font-bold">BERI RATING</button>` : 
                                    `<span class="text-[10px] text-green-500 font-black">SUDAH DINILAI</span>`
                                }
                            </div>
                        `;
                    });
                }

                container.innerHTML += `
                    <div class="bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-sm animate-card">
                        <div class="flex justify-between items-start mb-6 border-b pb-4">
                            <div>
                                <p class="text-[10px] font-black orange-text uppercase">${order.date}</p>
                                <h3 class="font-bold text-gray-800">${order.id}</h3>
                                <div class="inline-block bg-orange-100 text-orange-700 text-[10px] px-2 py-1 rounded-md mt-2 font-bold">
                                    🪙 +${order.earnedPoints || 0} Poin Didapat
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-gray-400 font-bold tracking-tighter uppercase">Total Bayar</p>
                                <p class="font-black text-gray-800 text-lg">Rp ${order.total.toLocaleString('id-ID')}</p>
                            </div>
                        </div>
                        <div class="space-y-1">${itemsHtml}</div>
                        <div class="mt-6 pt-4 border-t border-dashed text-center">
                            <a href="https://forms.gle/wMy51pbfT9BtLmef8" target="_blank" class="text-[11px] font-bold text-gray-400 hover:text-orange-500 transition">
                                Ada kendala? <span class="underline">Laporkan di Google Form</span>
                            </a>
                        </div>
                    </div>
                `;
            });
        }

        // Fungsi Modal Rating (Sama seperti sebelumnya)
        function openRatingModal(oIdx, iIdx, foodName) {
            currentOrderIdx = oIdx; currentItemIdx = iIdx; selectedStars = 0;
            document.getElementById('rating-food-name').innerText = foodName;
            document.getElementById('rating-comment').value = '';
            resetStars();
            document.getElementById('rating-modal').classList.replace('hidden', 'flex');
        }
        function setStar(num) {
            selectedStars = num; resetStars();
            for (let i = 1; i <= num; i++) document.getElementById(`star-${i}`).classList.replace('star-inactive', 'star-active');
        }
        function resetStars() {
            for (let i = 1; i <= 5; i++) document.getElementById(`star-${i}`).classList.replace('star-active', 'star-inactive');
        }
        function closeRatingModal() { document.getElementById('rating-modal').classList.replace('flex', 'hidden'); }
        function saveItemRating() {
            if (selectedStars === 0) return alert("Pilih bintang!");
            const history = JSON.parse(localStorage.getItem('kitchenHistory'));
            history[currentOrderIdx].items_detail[currentItemIdx].rating = selectedStars;
            history[currentOrderIdx].items_detail[currentItemIdx].comment = document.getElementById('rating-comment').value;
            localStorage.setItem('kitchenHistory', JSON.stringify(history));
            closeRatingModal(); renderHistory();
        }
    </script>
</body>
</html>
